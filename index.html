<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0f0f1a" />
<title>Drum Notation Trainer</title>
<style>
:root {
  --bg: #0f0f1a;
  --bg-card: #1a1a2e;
  --bg-card2: #16213e;
  --accent: #4f8ef7;
  --green: #2ecc71;
  --red: #e74c3c;
  --yellow: #f39c12;
  --orange: #e67e22;
  --text: #ffffff;
  --muted: #8888aa;
  --border: #2d2d4e;
  --radius: 14px;
  --radius-sm: 8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overscroll-behavior: none; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  user-select: none;
}
#app { display: flex; justify-content: center; min-height: 100dvh; }
.screen {
  width: 100%; max-width: 480px; min-height: 100dvh;
  display: flex; flex-direction: column;
  padding: 16px;
  padding-bottom: max(16px, env(safe-area-inset-bottom));
  overflow-y: auto;
}
 
/* ── Start Screen ── */
.start-header { text-align: center; padding: 24px 0 8px; }
.drum-icon { font-size: 56px; line-height: 1; margin-bottom: 12px; filter: drop-shadow(0 4px 8px rgba(79,142,247,.4)); }
.start-header h1 {
  font-size: 28px; font-weight: 800; line-height: 1.2; letter-spacing: -.5px;
  background: linear-gradient(135deg,#fff 0%,#a0c4ff 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.tagline { margin-top: 6px; font-size: 14px; color: var(--muted); letter-spacing: .5px; }
.levels-list { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
.level-card {
  background: var(--bg-card); border: 1.5px solid var(--border); border-radius: var(--radius);
  padding: 14px 16px; text-align: left; cursor: pointer; color: var(--text);
  transition: transform .12s, border-color .12s, box-shadow .12s; width: 100%; font-family: inherit;
}
.level-card:active:not(:disabled) { transform: scale(.97); }
.level-card:not(:disabled):hover { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(79,142,247,.2); }
.level-card.locked { opacity: .45; cursor: not-allowed; }
.level-card.passed { border-color: var(--green); }
.level-card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.level-emoji { font-size: 28px; line-height: 1; flex-shrink: 0; }
.level-info { flex: 1; }
.level-name { font-size: 17px; font-weight: 700; }
.level-subtitle { font-size: 12px; color: var(--muted); margin-top: 1px; }
.level-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
.level-stat { font-size: 11px; color: var(--muted); background: rgba(255,255,255,.06); padding: 2px 7px; border-radius: 99px; }
.level-desc { font-size: 13px; color: var(--muted); line-height: 1.4; margin-bottom: 8px; }
.level-score { font-size: 12px; color: var(--green); }
.level-score.no-score { color: var(--muted); }
.credits { text-align: center; font-size: 11px; color: var(--muted); padding: 8px 0 0; }
.legend-panel {
  margin-top: 18px; background: var(--bg-card); border: 1.5px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.legend-panel summary {
  list-style: none; cursor: pointer; padding: 14px 16px; font-weight: 700;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.legend-panel summary::-webkit-details-marker { display: none; }
.legend-panel summary::after {
  content: '▾'; color: var(--muted); font-size: 14px; transition: transform .15s ease;
}
.legend-panel:not([open]) summary::after { transform: rotate(-90deg); }
.legend-copy {
  padding: 0 16px 14px; color: var(--muted); font-size: 12px; line-height: 1.45;
}
.legend-grid {
  display: grid; grid-template-columns: 1fr; gap: 10px; padding: 0 12px 12px;
}
.legend-item {
  background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06);
  border-radius: var(--radius-sm); padding: 10px;
}
.legend-notation {
  background: white; border-radius: 10px; padding: 6px; box-shadow: inset 0 0 0 1px rgba(0,0,0,.04);
}
.legend-notation .drum-staff { max-height: 84px; }
.legend-name { margin-top: 8px; font-size: 14px; font-weight: 700; }
.legend-short { color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; }
.legend-placement { margin-top: 2px; color: var(--accent); font-size: 12px; font-weight: 600; }
.legend-desc {
  margin-top: 6px; color: var(--muted); font-size: 12px; line-height: 1.4;
  line-clamp: 2;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.app-footer {
  margin-top: auto;
  padding-top: 18px;
  text-align: center;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.5;
}
.app-footer-author {
  color: var(--text);
  font-weight: 700;
}
.app-footer-copy {
  letter-spacing: .2px;
}
.app-footer-version {
  margin-top: 4px;
  font-size: 10px;
  opacity: 0.5;
}
 
/* ── Difficulty Picker ── */
.diff-screen { align-items: center; justify-content: center; gap: 20px; text-align: center; }
.diff-screen h2 { font-size: 22px; font-weight: 800; }
.diff-level-info { font-size: 14px; color: var(--muted); }
.diff-list { display: flex; flex-direction: column; gap: 12px; width: 100%; }
.diff-card {
  background: var(--bg-card); border: 1.5px solid var(--border); border-radius: var(--radius);
  padding: 16px; text-align: left; cursor: pointer; color: var(--text);
  transition: transform .12s, border-color .12s; width: 100%; font-family: inherit;
  display: flex; align-items: center; gap: 14px;
}
.diff-card:active { transform: scale(.97); }
.diff-card:hover { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(79,142,247,.2); }
.diff-emoji { font-size: 28px; line-height: 1; flex-shrink: 0; }
.diff-info { flex: 1; }
.diff-name { font-size: 17px; font-weight: 700; }
.diff-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
.diff-score { font-size: 11px; color: var(--green); margin-top: 4px; }
.diff-score.no-score { color: var(--muted); }
.diff-back { margin-top: 4px; }

/* ── Lives Display ── */
.lives-display { font-size: 16px; letter-spacing: 2px; line-height: 1; }
.lives-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.game-over-banner { background: rgba(231,76,60,.15); border: 1px solid var(--red); border-radius: var(--radius-sm); padding: 10px 20px; color: var(--red); font-size: 14px; font-weight: 600; width: 100%; text-align: center; }

/* ── Game Screen ── */
.game-screen { gap: 10px; padding-top: max(12px, env(safe-area-inset-top)); }
.game-header { display: flex; justify-content: space-between; align-items: flex-start; }
.game-header-left { display: flex; flex-direction: column; gap: 2px; }
.game-header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
.level-label { font-size: 13px; color: var(--muted); font-weight: 500; }
.q-counter { font-size: 12px; color: var(--muted); }
.streak-badge { font-size: 14px; font-weight: 700; color: var(--orange); animation: pulse .8s infinite alternate; }
@keyframes pulse { from { opacity:.8; transform:scale(1); } to { opacity:1; transform:scale(1.06); } }
.score-display { font-size: 24px; font-weight: 800; letter-spacing: -1px; color: var(--accent); }
.timer-track { height: 6px; background: rgba(255,255,255,.08); border-radius: 99px; overflow: hidden; }
.timer-bar { height: 100%; background: var(--green); border-radius: 99px; transition: width 1s linear, background .3s; }
.timer-bar.warn { background: var(--red); }
.timer-num { text-align: right; font-size: 12px; color: var(--muted); margin-top: -4px; font-variant-numeric: tabular-nums; }
.timer-num.warn { color: var(--red); font-weight: 700; }
.notation-card {
  background: white; border-radius: var(--radius); padding: 8px;
  box-shadow: 0 4px 24px rgba(0,0,0,.4); transition: box-shadow .2s;
}
.notation-card.flash-correct { box-shadow: 0 0 0 3px var(--green), 0 4px 24px rgba(0,0,0,.4); }
.notation-card.flash-wrong   { box-shadow: 0 0 0 3px var(--red),   0 4px 24px rgba(0,0,0,.4); }
.drum-staff { width: 100%; height: auto; display: block; }
.q-prompt { text-align: center; font-size: 16px; font-weight: 500; color: var(--muted); min-height: 26px; }
.q-prompt .ok  { color: var(--green); font-weight: 700; font-size: 17px; }
.q-prompt .bad { color: var(--red); font-weight: 600; }
.pts { font-size: 15px; color: var(--yellow); }
.feedback-desc { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.4; padding: 0 8px; min-height: 36px; }
.choices { display: grid; gap: 8px; flex: 1; }
.choices.n3 { grid-template-columns: 1fr 1fr 1fr; }
.choices.n4, .choices.n5, .choices.n6, .choices.n7, .choices.n8 { grid-template-columns: 1fr 1fr; }
.choices.n5 .choice-btn:last-child, .choices.n7 .choice-btn:last-child { grid-column: 1 / -1; }
.choice-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  padding: 12px 8px; background: var(--bg-card); border: 1.5px solid var(--border);
  border-radius: var(--radius); color: var(--text); cursor: pointer;
  transition: transform .1s, border-color .15s, background .15s;
  min-height: 62px; font-family: inherit;
}
.choice-btn:active:not(:disabled) { transform: scale(.95); }
.choice-btn:not(:disabled):hover { border-color: var(--accent); background: var(--bg-card2); }
.choice-btn:disabled { cursor: default; }
.choice-btn.reveal-ok  { background: rgba(46,204,113,.18); border-color: var(--green); color: var(--green); }
.choice-btn.reveal-bad { background: rgba(231,76,60,.18);  border-color: var(--red);   color: var(--red); }
.choice-short { font-size: 11px; font-weight: 700; letter-spacing: .5px; color: var(--muted); text-transform: uppercase; }
.choice-btn.reveal-ok .choice-short, .choice-btn.reveal-bad .choice-short { color: inherit; }
.choice-name { font-size: 14px; font-weight: 600; text-align: center; line-height: 1.2; }
.streak-info { text-align: center; font-size: 13px; color: var(--orange); font-weight: 500; }
.game-actions { display: flex; justify-content: center; }
.game-actions .btn { max-width: 220px; padding: 12px 16px; font-size: 14px; }
 
/* ── Result Screen ── */
.result-screen { align-items: center; justify-content: center; gap: 20px; text-align: center; }
.result-emoji { font-size: 56px; line-height: 1; }
.result-screen h2 { font-size: 26px; font-weight: 800; }
.new-high {
  background: linear-gradient(135deg,var(--yellow),var(--orange));
  color: white; font-size: 13px; font-weight: 700; padding: 4px 14px; border-radius: 99px;
}
.result-score { font-size: 64px; font-weight: 900; letter-spacing: -3px; line-height: 1;
  background: linear-gradient(135deg,#4f8ef7,#a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.result-score-label { font-size: 14px; color: var(--muted); margin-top: 2px; }
.result-stats { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; width: 100%; }
.stat-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 12px 6px; display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.stat-grade { font-size: 28px; font-weight: 900; line-height: 1; }
.stat-val { font-size: 18px; font-weight: 700; line-height: 1; }
.stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.unlock-banner {
  background: rgba(46,204,113,.12); border: 1px solid var(--green); border-radius: var(--radius-sm);
  padding: 10px 20px; color: var(--green); font-size: 14px; font-weight: 600; width: 100%;
}
.pass-target { font-size: 13px; color: var(--muted); width: 100%; }
.result-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; }
.btn {
  width: 100%; padding: 16px; border-radius: var(--radius); font-family: inherit;
  font-size: 16px; font-weight: 700; cursor: pointer; border: none; transition: transform .1s;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: linear-gradient(135deg,var(--accent),#6366f1); color: white; box-shadow: 0 4px 16px rgba(79,142,247,.35); }
.btn-secondary { background: var(--bg-card); color: var(--text); border: 1.5px solid var(--border); }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.result-level-name { font-size: 12px; color: var(--muted); }
 
@media (max-height:700px) {
  .start-header { padding: 12px 0 4px; }
  .drum-icon { font-size: 40px; }
  .start-header h1 { font-size: 22px; }
  .result-score { font-size: 48px; }
  .result-emoji { font-size: 40px; }
}

@media (min-width:560px) {
  .legend-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';
 
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
// position: half-spaces from middle line (line 3).
// Positive = above, negative = below.
// stemDown is retained in note data for reference, but rendering now forces
// all stems upward on the right side to match the preferred display style.
// Staff lines at y = 38,50,62,74,86 (line 5 top → line 1 bottom).
// MIDDLE_Y = 62 (line 3). getY(pos) = 62 - pos * 6.
 
const DRUM_NOTES = {
  // Staff mapping follows the app's current reference preferences:
  // bass drum on bottom space, snare on third space, floor tom on second space,
  // middle tom on top line, high tom and closed/open hi-hat in the space above top line,
  // ride on the top line, crash above the hi-hat, and foot hi-hat below the staff.
  bass_drum:    { id:'bass_drum',    name:'Bass Drum',       shortName:'BD', description:'Played with the right foot pedal — the low-end anchor of the groove. Usually notated on the bottom space.',              position:-3, headType:'normal', stemDown:false },
  snare:        { id:'snare',        name:'Snare Drum',      shortName:'SD', description:'The main backbeat — usually hit on beats 2 and 4. Usually notated on the third space from the bottom.',              position: 1, headType:'normal', stemDown:true  },
  hihat_closed: { id:'hihat_closed', name:'Closed Hi-Hat',   shortName:'HH', description:'Two cymbals pressed together, struck with a stick. Usually notated as an X in the space above the top line.',              position: 5, headType:'x',      stemDown:false },
  crash:        { id:'crash',        name:'Crash Cymbal',    shortName:'CC', description:'Accent cymbal hit hard for emphasis — often marks the start of a phrase. In this app it is notated above the hi-hat, above the top line.', position: 6, headType:'x',      stemDown:false },
  floor_tom:    { id:'floor_tom',    name:'Floor Tom',       shortName:'FT', description:'The deepest-pitched tom — stands on legs to your right. Usually notated on the second space from the bottom.',         position:-1, headType:'normal', stemDown:false },
  high_tom:     { id:'high_tom',     name:'High Tom',        shortName:'T1', description:'The highest-pitched rack tom, mounted above the bass drum. In this app it is notated in the first space from the top of the staff.', position: 3, headType:'normal', stemDown:true  },
  ride:         { id:'ride',         name:'Ride Cymbal',     shortName:'RC', description:'Large cymbal for steady rhythms — common in jazz and rock. In this app it is notated on the very top line of the staff.',     position: 4, headType:'x',      stemDown:false },
  mid_tom:      { id:'mid_tom',      name:'Mid Tom',         shortName:'T2', description:'The middle rack tom — between high tom and floor tom in pitch. In this app it is notated on the second line from the top of the staff.', position: 2, headType:'normal', stemDown:true  },
  hihat_open:   { id:'hihat_open',   name:'Open Hi-Hat',     shortName:'OH', description:'Hi-hat cymbals slightly apart — a sustained "shhh" sound. Usually written as an X in the hi-hat position with a small o above.', position: 5, headType:'open_x', stemDown:false, hasOpenMark:true },
  ghost_snare:  { id:'ghost_snare',  name:'Ghost Note',      shortName:'GN', description:'A very soft snare hit — written in parentheses. Uses the same staff position as the snare drum.',                      position: 1, headType:'ghost',  stemDown:true  },
  hihat_foot:   { id:'hihat_foot',   name:'Hi-Hat Foot',     shortName:'HF', description:'Hi-hat closed with the left foot only — no stick. Usually notated below the bottom line.',                              position:-5, headType:'x',      stemDown:false },
};
 
const LEVELS = [
  { id:1, name:'Beginner',     emoji:'🥁', subtitle:'The Core Three',    description:'Bass drum, snare, and hi-hat — the building blocks of every beat.',                   notes:['bass_drum','snare','hihat_closed'],                                                                          choiceCount:3, timeLimit:15, questionsPerRound:10, pointsPerCorrect:100, passingScore:600  },
  { id:2, name:'Intermediate', emoji:'🎵', subtitle:'Expand the Kit',     description:'Add crash cymbal, floor tom, and high tom to your vocabulary.',                       notes:['bass_drum','snare','hihat_closed','crash','floor_tom','high_tom'],                                           choiceCount:4, timeLimit:10, questionsPerRound:12, pointsPerCorrect:150, passingScore:1500 },
  { id:3, name:'Advanced',     emoji:'⚡', subtitle:'Full Kit',           description:'Ride cymbal, mid tom, and open hi-hat join the mix.',                                 notes:['bass_drum','snare','hihat_closed','crash','floor_tom','high_tom','ride','mid_tom','hihat_open'],            choiceCount:5, timeLimit:8,  questionsPerRound:15, pointsPerCorrect:200, passingScore:3500 },
  { id:4, name:'Expert',       emoji:'🔥', subtitle:'Master the Details', description:'Ghost notes and hi-hat foot — the subtle elements that make grooves come alive.',    notes:['bass_drum','snare','hihat_closed','crash','floor_tom','high_tom','ride','mid_tom','hihat_open','ghost_snare','hihat_foot'], choiceCount:6, timeLimit:6,  questionsPerRound:18, pointsPerCorrect:250, passingScore:4500 },
];
 
const DIFFICULTIES = [
  { id:'easy',   name:'Easy',   emoji:'😊', timeMult:1.0, choiceAdd:0, lives:3, description:'3 lives · Full time' },
  { id:'medium', name:'Medium', emoji:'😤', timeMult:0.7, choiceAdd:1, lives:2, description:'2 lives · Less time · +1 choice' },
  { id:'hard',   name:'Hard',   emoji:'🔥', timeMult:0.4, choiceAdd:3, lives:0, description:'0 lives · 40% time · +3 choices' },
];

// ─────────────────────────────────────────────
// GAME LOGIC
// ─────────────────────────────────────────────
// Visual twins: notes at the same staff position — always include both in choices.
const VISUAL_TWINS = {
  snare:'ghost_snare', ghost_snare:'snare',
  hihat_closed:'hihat_open', hihat_open:'hihat_closed',
};

const REFERENCE_LEGEND = [
  { id:'bass_drum',    placement:'Bottom space' },
  { id:'floor_tom',    placement:'Second space from bottom' },
  { id:'snare',        placement:'Third space from bottom' },
  { id:'mid_tom',      placement:'Second line from top' },
  { id:'high_tom',     placement:'First space from top' },
  { id:'hihat_closed', placement:'Space above top line' },
  { id:'hihat_open',   placement:'Space above top line, o above X' },
  { id:'ride',         placement:'Top line' },
  { id:'crash',        placement:'Above hi-hat, above top line' },
  { id:'ghost_snare',  placement:'Snare position, in parentheses' },
  { id:'hihat_foot',   placement:'Below bottom line' },
];

const HIGH_SCORE_KEY = 'drumHighScores';
 
function shuffle(arr) { return [...arr].sort(() => Math.random() - .5); }
 
function generateQuestions(level) {
  const q = [];
  while (q.length < level.questionsPerRound) q.push(...shuffle(level.notes));
  return q.slice(0, level.questionsPerRound);
}
 
function generateChoices(correctId, level, choiceCount) {
  const count = choiceCount || level.choiceCount;
  const twin = VISUAL_TWINS[correctId];
  const mustHave = twin && level.notes.includes(twin) ? [twin] : [];
  const others = shuffle(level.notes.filter(id => id !== correctId && !mustHave.includes(id)));
  const filler = count - 1 - mustHave.length;
  return shuffle([correctId, ...mustHave, ...others.slice(0, filler)]);
}
 
function streakMultiplier(streak) {
  if (streak >= 10) return 3.0;
  if (streak >= 5)  return 2.0;
  if (streak >= 3)  return 1.5;
  return 1.0;
}
 
function calcPoints(timeLeft, level, streak) {
  const tl = state.effectiveTime || level.timeLimit;
  const speed = Math.floor((timeLeft / tl) * level.pointsPerCorrect * .5);
  return Math.floor((level.pointsPerCorrect + speed) * streakMultiplier(streak));
}
 
function loadHighScores() {
  let hs;
  try { hs = JSON.parse(localStorage.getItem(HIGH_SCORE_KEY) || '{}'); } catch { return {}; }
  // Migrate old format (numeric keys like {1:600}) → new format ("1-easy":600)
  let migrated = false;
  for (const key of Object.keys(hs)) {
    if (/^\d+$/.test(key)) {
      hs[key + '-easy'] = hs[key];
      delete hs[key];
      migrated = true;
    }
  }
  if (migrated) try { localStorage.setItem(HIGH_SCORE_KEY, JSON.stringify(hs)); } catch {}
  return hs;
}

function scoreKey(levelId, diffId) { return levelId + '-' + diffId; }

function saveHighScore(levelId, diffId, score) {
  const hs = loadHighScores();
  const k = scoreKey(levelId, diffId);
  if (!hs[k] || score > hs[k]) {
    hs[k] = score;
    try { localStorage.setItem(HIGH_SCORE_KEY, JSON.stringify(hs)); } catch {}
    return true;
  }
  return false;
}

function getBestForLevel(hs, levelId) {
  // Best score across all difficulties for a level
  let best = null;
  for (const diff of DIFFICULTIES) {
    const s = hs[scoreKey(levelId, diff.id)];
    if (s != null && (best == null || s > best)) best = s;
  }
  return best;
}

function getUnlockedLevel(hs) {
  let u = 1;
  for (const lv of LEVELS) {
    const best = getBestForLevel(hs, lv.id);
    if (best != null && best >= lv.passingScore) u = Math.min(lv.id + 1, LEVELS.length);
    else break;
  }
  return u;
}
 
// ─────────────────────────────────────────────
// SVG NOTATION
// ─────────────────────────────────────────────
const MIDDLE_Y = 62;   // y of line 3 (snare)
const HALF_SP  = 6;    // px per half-space
const NOTE_X   = 175;
const STAFF_X1 = 68;
const STAFF_X2 = 300;
const STAFF_YS = [38, 50, 62, 74, 86]; // line 5 → line 1
 
function getY(pos) { return MIDDLE_Y - pos * HALF_SP; }
 
function ledgerLines(pos) {
  const lines = [];
  // Above staff: ledger positions at pos=6 (y=26) and pos=8 (y=14)
  if (pos >= 6) lines.push(getY(6));
  if (pos >= 8) lines.push(getY(8));
  // Below staff: ledger positions at pos=-6 (y=98)
  if (pos <= -6) lines.push(getY(-6));
  if (pos <= -8) lines.push(getY(-8));
  return lines;
}
 
function buildStaffSVG(note) {
  const { id, position, headType } = note;
  const ny = getY(position);
  // User preference: all stems render on the right side and point upward.
  const needsAdjustedCymbalStem = id === 'ride' || id === 'crash' || id.startsWith('hihat_');
  const stemX = NOTE_X + (needsAdjustedCymbalStem ? 5 : 6);
  const stemY1 = ny - (needsAdjustedCymbalStem ? 4 : 0);
  const stemY2 = Math.max(6, ny - 30);
 
  let svg = '';
 
  // Staff lines
  for (const ly of STAFF_YS) {
    svg += `<line x1="${STAFF_X1}" y1="${ly}" x2="${STAFF_X2}" y2="${ly}" stroke="black" stroke-width="1.3"/>`;
  }
 
  // Percussion clef (two filled rectangles)
  const ch = STAFF_YS[4] - STAFF_YS[0];
  svg += `<rect x="${STAFF_X1+2}"  y="${STAFF_YS[0]}" width="5" height="${ch}" fill="black"/>`;
  svg += `<rect x="${STAFF_X1+11}" y="${STAFF_YS[0]}" width="5" height="${ch}" fill="black"/>`;
 
  // Ledger lines
  for (const ly of ledgerLines(position)) {
    svg += `<line x1="${NOTE_X-13}" y1="${ly}" x2="${NOTE_X+13}" y2="${ly}" stroke="black" stroke-width="1.5"/>`;
  }
 
  // Stem
  svg += `<line x1="${stemX}" y1="${stemY1}" x2="${stemX}" y2="${stemY2}" stroke="black" stroke-width="1.5"/>`;
 
  // Notehead
  if (headType === 'normal') {
    svg += `<ellipse cx="${NOTE_X}" cy="${ny}" rx="7" ry="5" transform="rotate(-20,${NOTE_X},${ny})" fill="black"/>`;
  } else if (headType === 'x') {
    const s = 5;
    svg += `<line x1="${NOTE_X-s}" y1="${ny-s}" x2="${NOTE_X+s}" y2="${ny+s}" stroke="black" stroke-width="2" stroke-linecap="round"/>`;
    svg += `<line x1="${NOTE_X+s}" y1="${ny-s}" x2="${NOTE_X-s}" y2="${ny+s}" stroke="black" stroke-width="2" stroke-linecap="round"/>`;
  } else if (headType === 'open_x') {
    const s = 5;
    svg += `<line x1="${NOTE_X-s}" y1="${ny-s}" x2="${NOTE_X+s}" y2="${ny+s}" stroke="black" stroke-width="2" stroke-linecap="round"/>`;
    svg += `<line x1="${NOTE_X+s}" y1="${ny-s}" x2="${NOTE_X-s}" y2="${ny+s}" stroke="black" stroke-width="2" stroke-linecap="round"/>`;
  } else if (headType === 'diamond') {
    svg += `<polygon points="${NOTE_X},${ny-7} ${NOTE_X+7},${ny} ${NOTE_X},${ny+7} ${NOTE_X-7},${ny}" fill="white" stroke="black" stroke-width="1.8"/>`;
  } else if (headType === 'ghost') {
    // Oval in parentheses for ghost note
    svg += `<text x="${NOTE_X-14}" y="${ny+5}" font-size="16" fill="black" font-family="Georgia,serif">(</text>`;
    svg += `<ellipse cx="${NOTE_X}" cy="${ny}" rx="7" ry="5" transform="rotate(-20,${NOTE_X},${ny})" fill="black"/>`;
    svg += `<text x="${NOTE_X+7}"  y="${ny+5}" font-size="16" fill="black" font-family="Georgia,serif">)</text>`;
  }

  if (note.hasClosedMark) {
    const my = ny - 12;
    svg += `<line x1="${NOTE_X-4}" y1="${my}" x2="${NOTE_X+4}" y2="${my}" stroke="black" stroke-width="1.6" stroke-linecap="round"/>`;
    svg += `<line x1="${NOTE_X}" y1="${my-4}" x2="${NOTE_X}" y2="${my+4}" stroke="black" stroke-width="1.6" stroke-linecap="round"/>`;
  }

  if (note.hasOpenMark) {
    svg += `<circle cx="${NOTE_X}" cy="${ny-13}" r="3.8" fill="white" stroke="black" stroke-width="1.4"/>`;
  }

  return `<svg viewBox="0 0 320 120" class="drum-staff" aria-label="${note.name} drum notation">`
       + `<rect width="320" height="120" fill="white"/>${svg}</svg>`;
}
 
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const state = {
  screen: 'start',       // 'start' | 'difficulty' | 'game' | 'result'
  level: null,
  difficulty: null,
  selectedLevel: null,    // set when picking difficulty
  effectiveTime: 0,       // computed timeLimit for current game
  effectiveChoices: 0,    // computed choiceCount for current game
  questions: [],
  qIndex: 0,
  choices: [],
  timeLeft: 0,
  score: 0,
  streak: 0,
  maxStreak: 0,
  correctCount: 0,
  mistakes: 0,
  lives: 0,
  gameOver: false,        // true when lives exhausted
  feedback: null,   // null | { correct, selectedId, correctId, points }
  result: null,
  timerInterval: null,
  feedbackTimeout: null,
};
 
function clearTimers() {
  clearInterval(state.timerInterval);
  clearTimeout(state.feedbackTimeout);
  state.timerInterval = null;
  state.feedbackTimeout = null;
}

function resetApp() {
  clearTimers();
  try { localStorage.removeItem(HIGH_SCORE_KEY); } catch {}
  Object.assign(state, {
    screen: 'start',
    level: null,
    difficulty: null,
    selectedLevel: null,
    effectiveTime: 0,
    effectiveChoices: 0,
    questions: [],
    qIndex: 0,
    choices: [],
    timeLeft: 0,
    score: 0,
    streak: 0,
    maxStreak: 0,
    correctCount: 0,
    mistakes: 0,
    lives: 0,
    gameOver: false,
    feedback: null,
    result: null,
  });
  render();
}
 
// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (state.screen === 'start')      app.innerHTML = renderStart();
  if (state.screen === 'difficulty')  app.innerHTML = renderDifficulty();
  if (state.screen === 'game')       app.innerHTML = renderGame();
  if (state.screen === 'result')     app.innerHTML = renderResult();
  bindEvents();
}

function renderReferenceLegend() {
  const cards = REFERENCE_LEGEND.map(({ id, placement }) => {
    const note = DRUM_NOTES[id];
    return `
      <article class="legend-item">
        <div class="legend-notation">${buildStaffSVG(note)}</div>
        <div class="legend-name">${note.name}</div>
        <div class="legend-short">${note.shortName}</div>
        <div class="legend-placement">${placement}</div>
        <div class="legend-desc">${note.description}</div>
      </article>`;
  }).join('');

  return `
    <details class="legend-panel" open>
      <summary>Reference Legend</summary>
      <div class="legend-copy">This legend uses the same renderer as the quiz cards, so the symbols here should match exactly what appears during play.</div>
      <div class="legend-grid">${cards}</div>
    </details>`;
}

const APP_VERSION = '0.12';

function renderFooter() {
  return `
    <footer class="app-footer" aria-label="Author and copyright">
      <div class="app-footer-author">Author: Xerxes Battiwalla</div>
      <div class="app-footer-copy">&copy; 2026 Xerxes Battiwalla. All rights reserved.</div>
      <div class="app-footer-version">v${APP_VERSION}</div>
    </footer>`;
}
 
function renderStart() {
  const hs = loadHighScores();
  const unlocked = getUnlockedLevel(hs);
  const showReset = Object.keys(hs).length > 0;
  const cards = LEVELS.map(lv => {
    const isLocked = lv.id > unlocked;
    const best = getBestForLevel(hs, lv.id);
    const passed = best != null && best >= lv.passingScore;
    const scoreHtml = best != null
      ? `<div class="level-score">${passed ? '✓ Passed — ' : ''}Best: <strong>${best.toLocaleString()}</strong>${!passed ? ` (need ${lv.passingScore.toLocaleString()})` : ''}</div>`
      : `<div class="level-score no-score">Not played yet</div>`;
    return `
      <button class="level-card${isLocked?' locked':''}${passed?' passed':''}" data-level="${lv.id}" ${isLocked?'disabled':''}>
        <div class="level-card-top">
          <span class="level-emoji">${isLocked?'🔒':lv.emoji}</span>
          <div class="level-info">
            <div class="level-name">${lv.name}</div>
            <div class="level-subtitle">${lv.subtitle}</div>
          </div>
          <div class="level-meta">
            <span class="level-stat">${lv.notes.length} notes</span>
            <span class="level-stat">${lv.timeLimit}s / Q</span>
          </div>
        </div>
        <div class="level-desc">${lv.description}</div>
        ${scoreHtml}
      </button>`;
  }).join('');
  return `
    <div class="screen">
      <div class="start-header">
        <div class="drum-icon">🥁</div>
        <h1>Drum Notation<br>Trainer</h1>
        <p class="tagline">Read the score. Nail the beat.</p>
      </div>
      <div class="levels-list">${cards}</div>
      ${renderReferenceLegend()}
      ${showReset ? '<div class="game-actions"><button class="btn btn-ghost" id="btn-reset-app">Reset App</button></div>' : ''}
      <p class="credits">Tap a level to start · Scores saved locally</p>
      ${renderFooter()}
    </div>`;
}

function renderDifficulty() {
  const lv = state.selectedLevel;
  const hs = loadHighScores();
  const cards = DIFFICULTIES.map(diff => {
    const effTime = Math.max(3, Math.floor(lv.timeLimit * diff.timeMult));
    const effChoices = Math.min(lv.notes.length, lv.choiceCount + diff.choiceAdd);
    const k = scoreKey(lv.id, diff.id);
    const best = hs[k];
    const scoreHtml = best != null
      ? `<div class="diff-score">Best: <strong>${best.toLocaleString()}</strong></div>`
      : `<div class="diff-score no-score">Not played</div>`;
    const livesText = diff.lives === 0 ? 'No mistakes allowed' : diff.lives + (diff.lives === 1 ? ' life' : ' lives');
    return `
      <button class="diff-card" data-diff="${diff.id}">
        <span class="diff-emoji">${diff.emoji}</span>
        <div class="diff-info">
          <div class="diff-name">${diff.name}</div>
          <div class="diff-desc">${livesText} · ${effTime}s per Q · ${effChoices} choices</div>
          ${scoreHtml}
        </div>
      </button>`;
  }).join('');
  return `
    <div class="screen diff-screen">
      <div>
        <div class="result-emoji">${lv.emoji}</div>
        <h2>${lv.name}</h2>
        <div class="diff-level-info">${lv.subtitle} · ${lv.notes.length} notes</div>
      </div>
      <div class="diff-list">${cards}</div>
      <button class="btn btn-ghost diff-back" id="btn-diff-back">← Back to Levels</button>
      ${renderFooter()}
    </div>`;
}
 
function renderGame() {
  const lv = state.level;
  const diff = state.difficulty;
  const note = DRUM_NOTES[state.questions[state.qIndex]];
  const timerPct = (state.timeLeft / state.effectiveTime) * 100;
  const warn = state.timeLeft <= 4;
  const mult = streakMultiplier(state.streak);
  const fb = state.feedback;

  let promptHtml = 'What drum element is this?';
  let descHtml = '';
  if (fb) {
    const correct = DRUM_NOTES[fb.correctId];
    promptHtml = fb.correct
      ? `<span class="ok">✓ ${correct.name}${fb.points ? `<span class="pts"> +${fb.points}</span>` : ''}</span>`
      : `<span class="bad">✗ That was the <strong>${correct.name}</strong></span>`;
    descHtml = correct.description;
  }

  const cardFlash = fb ? (fb.correct ? ' flash-correct' : ' flash-wrong') : '';
  const choiceBtns = state.choices.map(id => {
    let cls = 'choice-btn';
    if (fb) {
      if (id === fb.correctId) cls += ' reveal-ok';
      else if (id === fb.selectedId) cls += ' reveal-bad';
    }
    const n = DRUM_NOTES[id];
    return `<button class="${cls}" data-choice="${id}" ${fb?'disabled':''}>`
         + `<span class="choice-short">${n.shortName}</span>`
         + `<span class="choice-name">${n.name}</span></button>`;
  }).join('');

  const streakHtml = state.streak > 0 && !fb
    ? `<div class="streak-info">${state.streak >= 3 ? `🔥 ${state.streak} streak — ${mult.toFixed(1)}× multiplier!` : `${state.streak} in a row — keep going!`}</div>`
    : '';

  return `
    <div class="screen game-screen">
      <div class="game-header">
        <div class="game-header-left">
          <div class="level-label">${lv.emoji} ${lv.name} · ${diff.name}</div>
          <div class="q-counter">${state.qIndex + 1} / ${lv.questionsPerRound}</div>
        </div>
        <div class="game-header-right">
          <div class="lives-display" id="lives-display">${renderLivesInner()}</div>
          ${state.streak >= 3 ? `<div class="streak-badge">🔥 ×${mult.toFixed(1)}</div>` : ''}
          <div class="score-display">${state.score.toLocaleString()}</div>
        </div>
      </div>
      <div class="timer-track"><div class="timer-bar${warn?' warn':''}" id="timer-bar" style="width:${timerPct}%"></div></div>
      <div class="timer-num${warn?' warn':''}" id="timer-num">${state.timeLeft}s</div>
      <div class="notation-card${cardFlash}" id="notation-card">${buildStaffSVG(note)}</div>
      <div class="q-prompt" id="q-prompt">${promptHtml}</div>
      <div class="feedback-desc" id="feedback-desc">${descHtml}</div>
      <div class="choices n${state.effectiveChoices}">${choiceBtns}</div>
      ${streakHtml}
      <div class="game-actions">
        <button class="btn btn-ghost" id="btn-reset-app">Reset App</button>
      </div>
      ${renderFooter()}
    </div>`;
}
 
function renderResult() {
  const { score, correctCount, maxStreak, levelId, diffId, isNewHigh, passingScore, mistakes, gameOver, questionsAnswered } = state.result;
  const lv = LEVELS.find(l => l.id === levelId);
  const diff = DIFFICULTIES.find(d => d.id === diffId);
  const nextLv = LEVELS.find(l => l.id === levelId + 1);
  const total = lv.questionsPerRound;
  const acc = questionsAnswered > 0 ? Math.round((correctCount / questionsAnswered) * 100) : 0;
  const passed = !gameOver && score >= lv.passingScore;
  const grade = acc >= 90 ? 'S' : acc >= 75 ? 'A' : acc >= 60 ? 'B' : acc >= 45 ? 'C' : 'D';
  const gradeColor = {S:'#f39c12',A:'#2ecc71',B:'#3498db',C:'#9b59b6',D:'#e74c3c'}[grade];
  const headEmoji = gameOver ? '💀' : passed ? '🎉' : acc >= 50 ? '💪' : '😤';
  const headText = gameOver ? 'Game Over!' : passed ? 'Round Complete!' : 'Keep Practising!';
  return `
    <div class="screen result-screen">
      <div>
        <div class="result-emoji">${headEmoji}</div>
        <h2>${headText}</h2>
        ${gameOver ? '<div class="game-over-banner">Out of lives!</div>' : ''}
        ${isNewHigh ? '<div class="new-high">🏆 New High Score!</div>' : ''}
      </div>
      <div>
        <div class="result-score">${score.toLocaleString()}</div>
        <div class="result-score-label">points</div>
      </div>
      <div class="result-stats">
        <div class="stat-card"><div class="stat-grade" style="color:${gradeColor}">${grade}</div><div class="stat-label">Grade</div></div>
        <div class="stat-card"><div class="stat-val">${acc}%</div><div class="stat-label">Accuracy</div></div>
        <div class="stat-card"><div class="stat-val">${correctCount}/${questionsAnswered}</div><div class="stat-label">Correct</div></div>
        <div class="stat-card"><div class="stat-val">🔥${maxStreak}</div><div class="stat-label">Streak</div></div>
      </div>
      ${passed && nextLv ? `<div class="unlock-banner">🔓 ${nextLv.name} unlocked!</div>` : ''}
      ${!passed && !gameOver ? `<div class="pass-target">Score ${lv.passingScore.toLocaleString()} to unlock the next level (${score.toLocaleString()} / ${lv.passingScore.toLocaleString()})</div>` : ''}
      <div class="result-actions">
        ${passed && nextLv ? `<button class="btn btn-primary" id="btn-next">Next Level ${nextLv.emoji}</button>` : ''}
        <button class="btn btn-secondary" id="btn-replay">🔄 Play Again</button>
        <button class="btn btn-ghost" id="btn-menu">← Level Select</button>
        <button class="btn btn-ghost" id="btn-reset-app">Reset App</button>
      </div>
      <div class="result-level-name">${lv.emoji} ${lv.name} · ${diff.name} — ${lv.subtitle}</div>
      ${renderFooter()}
    </div>`;
}
 
// ─────────────────────────────────────────────
// GAME ACTIONS
// ─────────────────────────────────────────────
function startGame(levelId, diffId) {
  clearTimers();
  const lv = LEVELS.find(l => l.id === levelId);
  const diff = DIFFICULTIES.find(d => d.id === diffId) || DIFFICULTIES[0];
  const effTime = Math.max(3, Math.floor(lv.timeLimit * diff.timeMult));
  const effChoices = Math.min(lv.notes.length, lv.choiceCount + diff.choiceAdd);
  Object.assign(state, {
    screen: 'game', level: lv, difficulty: diff,
    effectiveTime: effTime, effectiveChoices: effChoices,
    questions: generateQuestions(lv),
    qIndex: 0, score: 0, streak: 0, maxStreak: 0, correctCount: 0,
    mistakes: 0, lives: diff.lives, gameOver: false, feedback: null,
  });
  state.choices = generateChoices(state.questions[0], lv, effChoices);
  state.timeLeft = effTime;
  render();
  startTimer();
}
 
function startTimer() {
  clearInterval(state.timerInterval);
  // Kick off the first bar transition immediately so the CSS animation
  // stays in sync with the JS countdown (the 1s CSS transition completes
  // exactly when the next interval tick fires).
  requestAnimationFrame(() => {
    const bar = document.getElementById('timer-bar');
    if (bar) {
      const next = (state.timeLeft - 1) / state.effectiveTime * 100;
      bar.style.width = Math.max(0, next) + '%';
      bar.classList.toggle('warn', state.timeLeft - 1 <= 4);
    }
  });
  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    const bar = document.getElementById('timer-bar');
    const num = document.getElementById('timer-num');
    if (num) { num.textContent = state.timeLeft + 's'; num.classList.toggle('warn', state.timeLeft <= 4); }
    if (state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      processAnswer(null);
    } else if (bar) {
      // Set bar to the *next* tick's value so the 1s CSS transition
      // finishes right as the next interval fires.
      const next = (state.timeLeft - 1) / state.effectiveTime * 100;
      bar.style.width = Math.max(0, next) + '%';
      bar.classList.toggle('warn', state.timeLeft - 1 <= 4);
    }
  }, 1000);
}
 
function processAnswer(selectedId) {
  if (state.feedback) return; // guard double-tap
  clearTimers();
  const correctId = state.questions[state.qIndex];
  const correct = selectedId === correctId;
  const pts = correct ? calcPoints(state.timeLeft, state.level, state.streak) : 0;

  state.feedback = { correct, selectedId, correctId, points: pts };
  state.score += pts;
  state.streak = correct ? state.streak + 1 : 0;
  state.maxStreak = Math.max(state.maxStreak, state.streak);
  if (correct) state.correctCount++;

  // Lives / mistakes
  if (!correct) {
    state.mistakes++;
    const diff = state.difficulty;
    if (diff.lives === 0 || state.mistakes > diff.lives) {
      state.gameOver = true;
    }
    // Update lives display immediately
    const livesEl = document.getElementById('lives-display');
    if (livesEl) livesEl.innerHTML = renderLivesInner();
  }

  // Patch DOM directly for snappiness
  const card   = document.getElementById('notation-card');
  const prompt = document.getElementById('q-prompt');
  const desc   = document.getElementById('feedback-desc');
  if (card)   card.classList.add(correct ? 'flash-correct' : 'flash-wrong');
  if (prompt) {
    const n = DRUM_NOTES[correctId];
    prompt.innerHTML = correct
      ? `<span class="ok">✓ ${n.name}${pts ? `<span class="pts"> +${pts}</span>` : ''}</span>`
      : `<span class="bad">✗ That was the <strong>${n.name}</strong></span>`;
  }
  if (desc) desc.textContent = DRUM_NOTES[correctId].description;

  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.disabled = true;
    const id = btn.dataset.choice;
    if (id === correctId) btn.classList.add('reveal-ok');
    else if (id === selectedId) btn.classList.add('reveal-bad');
  });

  state.feedbackTimeout = setTimeout(advance, 1600);
}

function renderLivesInner() {
  const diff = state.difficulty;
  if (diff.lives === 0) return '<span style="color:var(--red)">☠️ No mistakes!</span>';
  const remaining = Math.max(0, diff.lives - state.mistakes);
  const lost = diff.lives - remaining;
  return '❤️'.repeat(remaining) + '🖤'.repeat(lost);
}
 
function advance() {
  // Check for game over (lives exhausted)
  if (state.gameOver) {
    goToResult();
    return;
  }
  const nextIndex = state.qIndex + 1;
  if (nextIndex >= state.level.questionsPerRound) {
    goToResult();
  } else {
    state.qIndex = nextIndex;
    state.feedback = null;
    state.choices = generateChoices(state.questions[nextIndex], state.level, state.effectiveChoices);
    state.timeLeft = state.effectiveTime;
    render();
    startTimer();
  }
}

function goToResult() {
  const isNewHigh = saveHighScore(state.level.id, state.difficulty.id, state.score);
  state.result = {
    score: state.score, correctCount: state.correctCount, maxStreak: state.maxStreak,
    levelId: state.level.id, diffId: state.difficulty.id,
    isNewHigh, passingScore: state.level.passingScore,
    mistakes: state.mistakes, gameOver: state.gameOver,
    questionsAnswered: state.qIndex + 1,
  };
  state.screen = 'result';
  render();
}
 
// ─────────────────────────────────────────────
// EVENT BINDING
// ─────────────────────────────────────────────
function bindEvents() {
  // Start screen: level cards → difficulty picker
  document.querySelectorAll('.level-card:not(:disabled)').forEach(btn =>
    btn.addEventListener('click', () => {
      state.selectedLevel = LEVELS.find(l => l.id === +btn.dataset.level);
      state.screen = 'difficulty';
      render();
    }));
  // Difficulty picker
  document.querySelectorAll('.diff-card').forEach(btn =>
    btn.addEventListener('click', () => startGame(state.selectedLevel.id, btn.dataset.diff)));
  const diffBack = document.getElementById('btn-diff-back');
  if (diffBack) diffBack.addEventListener('click', () => { state.screen = 'start'; render(); });
  // Game screen: choices
  document.querySelectorAll('.choice-btn:not(:disabled)').forEach(btn =>
    btn.addEventListener('click', () => processAnswer(btn.dataset.choice)));
  // Result screen
  const next   = document.getElementById('btn-next');
  const replay = document.getElementById('btn-replay');
  const menu   = document.getElementById('btn-menu');
  const reset  = document.getElementById('btn-reset-app');
  if (next)   next.addEventListener('click',   () => startGame(state.level.id + 1, state.difficulty.id));
  if (replay) replay.addEventListener('click', () => startGame(state.level.id, state.difficulty.id));
  if (menu)   menu.addEventListener('click',   () => { state.screen = 'start'; render(); });
  if (reset)  reset.addEventListener('click',  resetApp);
}
 
// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', render);
</script>
